<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>检测日志</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0d0d14;
      --bg-secondary: #13131f;
      --bg-card: #181824;
      --bg-card-hover: #1e1e2e;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-active: rgba(139, 92, 246, 0.3);
      --text-primary: #f0f0f5;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-muted: rgba(255, 255, 255, 0.35);
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 头部 */
    .header {
      background: var(--bg-secondary);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      color: var(--text-secondary);
    }
    .icon-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .icon-btn.active {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent-yellow);
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg-card);
      color: var(--text-secondary);
    }
    .btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .btn-danger { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }

    /* 统计栏 */
    .stats-bar {
      background: var(--bg-secondary);
      padding: 8px 12px;
      display: flex;
      gap: 16px;
      font-size: 11px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .stat-item { display: flex; align-items: center; gap: 4px; }
    .stat-item .count { color: var(--accent-purple); font-weight: 600; }

    /* 日志容器 */
    .logs-container { flex: 1; overflow-y: auto; padding: 12px; }
    .logs-container::-webkit-scrollbar { width: 6px; }
    .logs-container::-webkit-scrollbar-track { background: transparent; }
    .logs-container::-webkit-scrollbar-thumb {
      background: var(--bg-card);
      border-radius: 3px;
    }

    /* 日志组 */
    .log-group {
      background: var(--bg-card);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid var(--border-subtle);
    }
    .log-group:hover { border-color: var(--border-active); }

    .log-header {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border-bottom: 1px solid var(--border-subtle);
    }
    .log-header:hover { background: rgba(255, 255, 255, 0.02); }
    .log-url {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }
    .log-meta { font-size: 10px; color: var(--text-muted); display: flex; gap: 10px; margin-top: 4px; }
    .toggle-icon { color: var(--text-muted); font-size: 10px; }

    .log-details {
      padding: 12px 14px;
      display: none;
      border-top: 1px solid var(--border-subtle);
    }
    .log-details.show { display: block; }

    .dup-item {
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.15);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .dup-item:last-child { margin-bottom: 0; }
    .dup-reason { color: var(--accent-red); margin-bottom: 6px; font-weight: 500; }
    .dup-text { color: var(--text-secondary); line-height: 1.6; }
    .dup-text .section-bracket { color: var(--accent-purple); font-size: 10px; }
    .dup-text mark {
      background: rgba(239, 68, 68, 0.3);
      color: #fff;
      padding: 1px 3px;
      border-radius: 2px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-purple);
      margin: 14px 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .section-title:first-child { margin-top: 0; }

    .sample-sentence {
      background: rgba(139, 92, 246, 0.06);
      border: 1px solid rgba(139, 92, 246, 0.12);
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 11px;
    }
    .sample-pos { color: var(--accent-purple); margin-bottom: 4px; font-weight: 500; }
    .sample-text { color: var(--text-secondary); line-height: 1.5; word-break: break-all; }

    .no-dup-tip {
      background: rgba(16, 185, 129, 0.06);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      color: var(--accent-green);
      text-align: center;
    }

    /* 空状态 */
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-secondary); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* 导出模态框 */
    .export-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .export-modal.show { display: flex; }
    .modal-content {
      background: var(--bg-card);
      border-radius: 10px;
      padding: 20px;
      max-width: 520px;
      width: 92%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border-subtle);
    }
    .modal-header { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    .modal-textarea {
      width: 100%;
      height: 280px;
      background: var(--bg-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 12px;
      font-family: monospace;
      font-size: 11px;
      resize: none;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .modal-actions .btn {
      background: var(--accent-purple);
      color: white;
      padding: 8px 16px;
    }
    .modal-actions .btn:hover { background: #7c3aed; }
    .modal-actions .btn-secondary {
      background: var(--bg-card-hover);
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>检测日志</h1>
    <div class="header-actions">
      <button class="icon-btn" id="pinBtn" title="置顶">Pin</button>
      <button class="btn" id="exportBtn">导出</button>
      <button class="btn btn-danger" id="clearBtn">清除</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <span>总案例:</span>
      <span class="count" id="totalCount">0</span>
    </div>
    <div class="stat-item">
      <span>当前页:</span>
      <span class="count" id="currentPageCount">0</span>
    </div>
  </div>

  <div class="logs-container" id="logsContainer">
    <div class="empty-state">
      <div class="icon">...</div>
      <div>暂无检测日志</div>
    </div>
  </div>

  <div class="export-modal" id="exportModal">
    <div class="modal-content">
      <div class="modal-header">导出案例</div>
      <textarea class="modal-textarea" id="exportText" readonly></textarea>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="closeModalBtn">关闭</button>
        <button class="btn" id="copyBtn">复制</button>
      </div>
    </div>
  </div>

  <script src="logs.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>检测结果</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0d0d14;
      --bg-secondary: #13131f;
      --bg-card: #181824;
      --bg-card-hover: #1e1e2e;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-active: rgba(139, 92, 246, 0.3);
      --text-primary: #f0f0f5;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-muted: rgba(255, 255, 255, 0.35);
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-yellow: #f59e0b;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 头部 */
    .header {
      background: var(--bg-secondary);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      color: var(--text-secondary);
    }
    .icon-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .icon-btn.active {
      background: rgba(245, 158, 11, 0.15);
      color: var(--accent-yellow);
    }

    /* 统计栏 */
    .stats-bar {
      background: var(--bg-secondary);
      padding: 10px 16px;
      display: flex;
      gap: 20px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .stat-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .stat-value { font-weight: 600; color: var(--text-primary); }
    .stat-label { color: var(--text-muted); }
    .stat-item.warning .stat-value { color: var(--accent-red); }
    .stat-item.success .stat-value { color: var(--accent-green); }

    /* URL栏 */
    .url-bar {
      background: var(--bg-secondary);
      padding: 8px 16px;
      font-size: 11px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    /* 结果容器 */
    .results-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .results-container::-webkit-scrollbar { width: 6px; }
    .results-container::-webkit-scrollbar-track { background: transparent; }
    .results-container::-webkit-scrollbar-thumb {
      background: var(--bg-card);
      border-radius: 3px;
    }
    .results-container::-webkit-scrollbar-thumb:hover {
      background: var(--bg-card-hover);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state .title { font-size: 16px; margin-bottom: 8px; }
    .empty-state .desc { font-size: 13px; color: var(--text-muted); }

    /* 加载状态 */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
    }
    .loading-state .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(139, 92, 246, 0.15);
      border-top-color: var(--accent-purple);
      border-radius: 50%;
    }
    .loading-state .text { color: var(--text-secondary); font-size: 14px; }

    /* 重复组 */
    .dup-group {
      background: var(--bg-card);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      border: 1px solid var(--border-subtle);
    }
    .dup-group:hover { border-color: var(--border-active); }

    .dup-header {
      padding: 10px 12px;
      background: rgba(239, 68, 68, 0.08);
      border-bottom: 1px solid rgba(239, 68, 68, 0.12);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dup-icon {
      width: 26px;
      height: 26px;
      background: rgba(239, 68, 68, 0.15);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .dup-label { font-size: 13px; font-weight: 600; color: var(--accent-red); }
    .dup-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.06);
      padding: 3px 8px;
      border-radius: 10px;
    }

    /* 公共内容 */
    .dup-common {
      padding: 10px 12px;
      background: rgba(139, 92, 246, 0.05);
      border-bottom: 1px solid rgba(139, 92, 246, 0.1);
    }
    .dup-common-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent-purple);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .dup-common-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      word-break: break-all;
      padding: 8px 10px;
      background: rgba(139, 92, 246, 0.08);
      border-radius: 4px;
    }

    /* 句子卡片 */
    .sentence-card {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sentence-card:last-child { border-bottom: none; }

    .sentence-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
    }
    .section-tag {
      background: rgba(139, 92, 246, 0.15);
      color: var(--accent-purple);
    }
    .pos-tag {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
    }
    .status-tag { margin-left: auto; }
    .status-tag.keep {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-green);
    }
    .status-tag.delete {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent-red);
    }

    .sentence-text {
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-secondary);
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
      word-break: break-word;
    }
    .sentence-text * {
      user-select: text;
      -webkit-user-select: text;
    }
    .sentence-text mark {
      background: rgba(239, 68, 68, 0.25);
      color: #fff;
      padding: 1px 3px;
      border-radius: 2px;
      user-select: none;
    }

    /* 定位按钮 */
    .locate-btn {
      margin-left: 6px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      color: var(--accent-red);
    }
    .locate-btn:hover {
      background: rgba(239, 68, 68, 0.25);
      border-color: var(--accent-red);
    }

    /* 建议 */
    .dup-suggestion {
      margin: 10px 12px 12px;
      padding: 10px;
      background: rgba(16, 185, 129, 0.06);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 6px;
    }
    .dup-suggestion-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent-green);
      margin-bottom: 4px;
    }
    .dup-suggestion-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* 摘要样式 */
    .summary-container {
      background: var(--bg-card);
      border-radius: 8px;
      padding: 14px;
      border: 1px solid var(--border-subtle);
    }
    .summary-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-subtle);
      word-break: break-all;
    }
    .summary-content {
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-secondary);
      white-space: pre-wrap;
      user-select: text;
    }
    .copy-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 6px;
      color: var(--accent-purple);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .copy-btn:hover {
      background: rgba(139, 92, 246, 0.25);
    }
    .copy-btn.copied {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.3);
      color: var(--accent-green);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>检测结果</h1>
    <div class="header-actions">
      <button type="button" class="icon-btn" id="pinBtn" title="置顶">Pin</button>
      <button type="button" class="icon-btn" id="closeBtn">X</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item success">
      <span class="stat-value" id="timeCost">-</span>
      <span class="stat-label">耗时</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="totalSentences">-</span>
      <span class="stat-label">句子</span>
    </div>
    <div class="stat-item warning">
      <span class="stat-value" id="totalDups">-</span>
      <span class="stat-label">重复</span>
    </div>
  </div>

  <div class="url-bar" id="urlBar">等待检测...</div>

  <div class="results-container" id="resultsContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="text">准备中...</div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
